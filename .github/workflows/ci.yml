name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        run: python -m py_compile wincdu-headless.py

      - name: Generate sample headless report
        shell: bash
        run: |
          python wincdu-headless.py . report.html
          test -s report.html

      - name: Validate Windows wrapper exists
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path .\wincdu-headless.cmd)) {
            throw 'wincdu-headless.cmd is missing'
          }

  shellcheck:
    name: Shell checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck build/template.sh
